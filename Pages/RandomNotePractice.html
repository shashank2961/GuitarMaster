<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <title>Random Note Generator</title>
</head>

<body>
    <a href="../Index.html" class="button">Return</a>

    <div id="container">
        <h1>Random Notes Practice</h1>
        <h3>Play the note</h3>
        <button id="mic-button">MICROPHONE</button>

        <!-- Staff -->
        <div id="staff">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>

            <div id="note"></div>
        </div>

        <h4 id="feedback-message">Type the correct note</h4>
        <h4 id="pitch-display">Detected Pitch: -- Hz</h4>
    </div>

    <script src="../JS/MusicStaff.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/alexanderbento/pitch-detection-autocorrelation/pitchDetector.js"></script>
</body>
</html>
